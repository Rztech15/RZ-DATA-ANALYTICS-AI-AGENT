<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rz Ai Data Analyst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; background: #0A1428; color: #E6EAF0; }
  #app { max-width: 560px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
  .header { border-bottom: 1px solid #20365B; padding: 14px 16px; background: #0E1B33; }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 0.5px; }
  .brand-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7C8797; }
  .btn-row { display: flex; gap: 8px; }
  .icon-btn { display: flex; align-items: center; gap: 6px; background: #182D4D; border: 1px solid #2E4571; border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: 'IBM Plex Mono', monospace; cursor: pointer; }
  .icon-btn.csv { color: #2F6FED; }
  .icon-btn.paste { color: #4FA3F7; }
  .status-bar { margin-top: 10px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7C8797; }
  .quality-good { color: #4FA3F7; }
  .quality-bad { color: #E5484D; }
  .clear-btn { background: none; border: none; color: #7C8797; cursor: pointer; margin-left: auto; font-size: 14px; }
  .paste-panel { margin-top: 10px; display: none; }
  .paste-panel.open { display: block; }
  textarea.paste-area { width: 100%; background: #132340; border: 1px solid #2E4571; border-radius: 6px; color: #E6EAF0; padding: 8px 10px; font-size: 12px; font-family: 'IBM Plex Mono', monospace; outline: none; resize: vertical; }
  .paste-actions { display: flex; gap: 8px; margin-top: 6px; }
  .load-btn { background: #2F6FED; border: none; border-radius: 6px; color: #0A1428; padding: 6px 12px; font-size: 12px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; cursor: pointer; }
  .cancel-btn { background: none; border: 1px solid #2E4571; border-radius: 6px; color: #7C8797; padding: 6px 12px; font-size: 12px; font-family: 'IBM Plex Mono', monospace; cursor: pointer; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; }
  .msg-row { display: flex; margin-bottom: 14px; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }
  .bubble { max-width: 85%; border-radius: 10px; padding: 10px 13px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
  .bubble.user { background: #182D4D; border: 1px solid #2E4571; }
  .bubble.assistant { background: #132340; border: 1px solid #20365B; border-left: 3px solid #2F6FED; }
  .thinking { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #7C8797; }
  .error-line { display: flex; align-items: center; gap: 6px; color: #E5484D; font-size: 12px; font-family: 'IBM Plex Mono', monospace; margin-top: 6px; }
  .input-bar { border-top: 1px solid #20365B; padding: 12px 16px; background: #0E1B33; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  textarea#chat-input { flex: 1; resize: none; background: #132340; border: 1px solid #2E4571; border-radius: 8px; color: #E6EAF0; padding: 10px 12px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
  #send-btn { background: #2F6FED; border: none; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 16px; }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #file-input { position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-row">
      <div class="brand">
        <span style="color:#2F6FED;">▲</span>
        <span class="brand-name">RZ AI</span>
        <span class="brand-sub">data analyst</span>
      </div>
      <div class="btn-row">
        <label class="icon-btn csv" for="file-input">⬆ CSV</label>
        <input id="file-input" type="file" accept=".csv" />
        <button class="icon-btn paste" id="paste-toggle">Paste</button>
      </div>
    </div>
    <div class="status-bar" id="status-bar" style="display:none;"></div>
    <div class="paste-panel" id="paste-panel">
      <textarea class="paste-area" id="paste-area" rows="5" placeholder="Paste CSV content here (including the header row)..."></textarea>
      <div class="paste-actions">
        <button class="load-btn" id="load-btn">Load data</button>
        <button class="cancel-btn" id="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <div id="messages"></div>

  <div class="input-bar">
    <div class="input-row">
      <textarea id="chat-input" rows="1" placeholder="Ask Rz about your data..."></textarea>
      <button id="send-btn">➤</button>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are Rz, an elite AI Data Analyst — combining the expertise of a Senior Data Analyst, BI Consultant, Data Scientist, and Strategy Advisor.

CORE PRINCIPLES:
- Accuracy before speed. Never invent facts, numbers, or sources.
- Clearly separate facts, assumptions, and recommendations.
- If information is missing, ask a focused clarifying question.
- Explain technical concepts simply unless advanced detail is requested.
- Say so when uncertain, and explain what's needed to resolve it.

EXPERTISE: Excel, Google Sheets, SQL, Python (Pandas/NumPy/Matplotlib), Power BI, Tableau, statistics, KPI design, financial/sales/marketing/HR/customer analytics, time series, forecasting, A/B testing.

WORKFLOW when analyzing data: understand the business problem → define objective/KPIs → inspect dataset → assess data quality → clean/preprocess → EDA → trends & anomalies → statistical analysis if needed → visualization recommendations → business insights (what happened, why, why it matters, what to do) → risks & limitations → next steps.

DATA QUALITY CHECKS: missing values, duplicates, wrong types, invalid dates, outliers, inconsistent categories, blank rows, formatting issues, calculation errors.

VISUALIZATION RULES: bar = comparison, line = trends, pie = composition, scatter = correlation, histogram = distribution, heatmap = relationships, box plot = outliers.

FORMAT: Use clear headers only when the analysis is substantial (real dataset or multi-part question). For quick questions, answer directly and concisely — don't force a template onto a one-line question. Use bold for key numbers, bullet points and short paragraphs, tables where useful. Avoid unnecessary jargon. Be objective, evidence-driven, and focused on business impact — teach while solving.

You will sometimes be given a dataset preview (columns, row count, sample rows, and basic quality stats computed in-app). Treat those as ground truth. Never fabricate numbers beyond what's given — if the user asks something the preview can't answer, say what additional data or a full export would be needed.`;

let messages = [
  { role: "assistant", content: "I'm Rz, your AI data analyst. Upload a CSV to get a real data quality read and analysis, or just ask me a question — SQL, Excel formulas, dashboard design, whatever you need." }
];
let dataset = null;
let loading = false;

const messagesEl = document.getElementById('messages');
const statusBar = document.getElementById('status-bar');
const pastePanel = document.getElementById('paste-panel');
const pasteArea = document.getElementById('paste-area');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const fileInput = document.getElementById('file-input');

function escapeHtml(str) {
  const div = document.createElement('div');
  div.innerText = str;
  return div.innerHTML;
}

function renderMessages() {
  messagesEl.innerHTML = '';
  messages.forEach(m => {
    const row = document.createElement('div');
    row.className = 'msg-row ' + m.role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + m.role;
    bubble.innerHTML = escapeHtml(m.content);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
  });
  if (loading) {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.innerHTML = '<div class="bubble assistant thinking">analyzing...</div>';
    messagesEl.appendChild(row);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showError(msg) {
  const row = document.createElement('div');
  row.className = 'error-line';
  row.innerText = '⚠ ' + msg;
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function computeProfile(data, fields) {
  const rowCount = data.length;
  const cols = fields.map((f) => {
    let missing = 0, numeric = 0;
    const seen = new Set();
    data.forEach((row) => {
      const v = row[f];
      if (v === null || v === undefined || v === "") missing++;
      else {
        if (!isNaN(parseFloat(v)) && isFinite(v)) numeric++;
        seen.add(v);
      }
    });
    const type = numeric / Math.max(rowCount - missing, 1) > 0.8 ? "numeric" : "text";
    return { name: f, type, missing, missingPct: rowCount ? ((missing / rowCount) * 100).toFixed(1) : "0", distinct: seen.size };
  });
  const seenRows = new Set();
  let dupRows = 0;
  data.forEach((row) => {
    const key = JSON.stringify(row);
    if (seenRows.has(key)) dupRows++;
    seenRows.add(key);
  });
  const totalMissing = cols.reduce((a, c) => a + c.missing, 0);
  const totalCells = rowCount * fields.length;
  const qualityScore = totalCells ? Math.max(0, 100 - (totalMissing / totalCells) * 100 - (dupRows / Math.max(rowCount, 1)) * 30) : 100;
  return { rowCount, colCount: fields.length, cols, dupRows, qualityScore: qualityScore.toFixed(0) };
}

function renderStatusBar() {
  if (!dataset) { statusBar.style.display = 'none'; return; }
  statusBar.style.display = 'flex';
  const q = dataset.profile.qualityScore;
  statusBar.innerHTML = `
    <span style="color:#4FA3F7;">📄 ${escapeHtml(dataset.fileName)}</span>
    <span>${dataset.profile.rowCount.toLocaleString()} rows</span>
    <span>${dataset.profile.colCount} cols</span>
    <span class="${q > 80 ? 'quality-good' : 'quality-bad'}">quality ${q}/100</span>
    <button class="clear-btn" id="clear-dataset">✕</button>
  `;
  document.getElementById('clear-dataset').onclick = () => { dataset = null; renderStatusBar(); };
}

function loadCsvText(text, label) {
  Papa.parse(text, {
    header: true,
    dynamicTyping: false,
    skipEmptyLines: true,
    complete: (results) => {
      const fields = results.meta.fields || [];
      const rows = results.data;
      if (!fields.length || !rows.length) { showError("Couldn't find valid CSV rows/columns in that text."); return; }
      const profile = computeProfile(rows, fields);
      dataset = { fileName: label, fields, rows, profile };
      renderStatusBar();
      pastePanel.classList.remove('open');
      pasteArea.value = '';
      messages.push({ role: 'assistant', content: `Loaded ${label} — ${profile.rowCount.toLocaleString()} rows × ${profile.colCount} columns. Quality score: ${profile.qualityScore}/100. Ask me anything about it, or say "analyze this" for a full breakdown.` });
      renderMessages();
    },
    error: (err) => showError("Couldn't parse that: " + err.message)
  });
}

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => loadCsvText(ev.target.result, file.name);
  reader.onerror = () => showError("Couldn't read that file.");
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('paste-toggle').onclick = () => pastePanel.classList.toggle('open');
document.getElementById('cancel-btn').onclick = () => { pastePanel.classList.remove('open'); pasteArea.value = ''; };
document.getElementById('load-btn').onclick = () => {
  if (pasteArea.value.trim()) loadCsvText(pasteArea.value, 'pasted data');
};

function buildDataContext() {
  if (!dataset) return '';
  const { fileName, fields, rows, profile } = dataset;
  const sample = rows.slice(0, 8);
  return `\n\n---DATASET CONTEXT---\nFile: ${fileName}\nRows: ${profile.rowCount}, Columns: ${profile.colCount}\nQuality score: ${profile.qualityScore}/100, Duplicate rows: ${profile.dupRows}\n\nColumn profile:\n${profile.cols.map(c => `- ${c.name} (${c.type}): ${c.missingPct}% missing, ${c.distinct} distinct values`).join('\n')}\n\nSample rows (first 8, as JSON):\n${JSON.stringify(sample)}\n---END DATASET CONTEXT---`;
}

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || loading) return;
  messages.push({ role: 'user', content: text });
  chatInput.value = '';
  loading = true;
  renderMessages();

  try {
    const apiMessages = messages.map((m, i) => {
      if (i === messages.length - 1 && m.role === 'user' && dataset) {
        return { role: 'user', content: m.content + buildDataContext() };
      }
      return { role: m.role, content: m.content };
    });

    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: SYSTEM_PROMPT, messages: apiMessages })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Request failed');

    const textBlocks = (data.content || []).map(b => b.type === 'text' ? b.text : '').filter(Boolean).join('\n');
    messages.push({ role: 'assistant', content: textBlocks || "Sorry, I didn't get a response — try again." });
  } catch (err) {
    showError('Something went wrong reaching Rz: ' + err.message);
  } finally {
    loading = false;
    renderMessages();
  }
}

sendBtn.onclick = sendMessage;
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

renderMessages();
</script>
</body>
</html>
