<script>
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

let sb;
let supabaseInitError = null;
try {
  if (SUPABASE_URL.includes('YOUR_SUPABASE') || SUPABASE_ANON_KEY.includes('YOUR_SUPABASE')) {
    throw new Error('Supabase URL/key were not filled in.');
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch (e) {
  supabaseInitError = e.message;
  console.error('Supabase init failed:', e);
}

const SYSTEM_PROMPT = `You are Rz, an elite AI Data Analyst — combining the expertise of a Senior Data Analyst, BI Consultant, Data Scientist, and Strategy Advisor.

CORE PRINCIPLES:
- Accuracy before speed. Never invent facts, numbers, or sources.
- Clearly separate facts, assumptions, and recommendations.
- If information is missing, ask a focused clarifying question.
- Explain technical concepts simply unless advanced detail is requested.
- Say so when uncertain, and explain what's needed to resolve it.

EXPERTISE: Excel, Google Sheets, SQL, Python (Pandas/NumPy/Matplotlib), Power BI, Tableau, statistics, KPI design, financial/sales/marketing/HR/customer analytics, time series, forecasting, A/B testing.

WORKFLOW when analyzing data: understand the business problem → define objective/KPIs → inspect dataset → assess data quality → clean/preprocess → EDA → trends & anomalies → statistical analysis if needed → visualization recommendations → business insights (what happened, why, why it matters, what to do) → risks & limitations → next steps.

DATA QUALITY CHECKS: missing values, duplicates, wrong types, invalid dates, outliers, inconsistent categories, blank rows, formatting issues, calculation errors.

VISUALIZATION RULES: bar = comparison, line = trends, pie = composition, scatter = correlation, histogram = distribution, heatmap = relationships, box plot = outliers.

FORMAT: Use clear headers only when the analysis is substantial (real dataset or multi-part question). For quick questions, answer directly and concisely — don't force a template onto a one-line question. When using headers, use markdown ## syntax; for lists use markdown - bullets; use **bold** for key numbers. Use bold for key numbers, bullet points and short paragraphs, tables where useful. Avoid unnecessary jargon. Be objective, evidence-driven, and focused on business impact — teach while solving.

INSIGHT QUALITY RULES (apply whenever giving insights or recommendations on a dataset):
- Quantify every insight with an actual number or percentage from the provided data context — never write a vague claim like "Fashion performs best" without the number behind it (e.g. "Fashion generated Rs. 1.24M, 42% of total profit").
- Prioritize insights with a label at the start of each bullet: 🔴 Critical (data integrity issues, big revenue risks), 🟡 Medium (notable but not urgent), 🟢 Opportunity (positive finding or growth lever).
- Explain the "why" behind numbers, not just the numbers themselves — e.g. note when a smaller-revenue category actually has a better margin, or when a trend has a plausible business cause.
- If the data context lists duplicate business keys or anomalies (negative values, impossible ages, future dates, outliers), always mention them explicitly with their exact counts — these are real detected issues, not hypothetical, so state them with confidence.
- When giving a recommendation, where reasonable state a rough confidence level and what it's based on (e.g. "Confidence: high, based on 1,000 records" or "Confidence: moderate — only 12 data points").

You will sometimes be given a dataset preview (columns, row count, sample rows, and basic quality stats computed in-app). Treat those as ground truth. Never fabricate numbers beyond what's given — if the user asks something the preview can't answer, say what additional data or a full export would be needed. Important: the dataset preview is background context, not an instruction to analyze — if the user's actual message is just a greeting, thanks, or casual comment, respond to that naturally and briefly; don't restate or re-run analysis unless they actually ask a data question.`;

let messages = [
  { role: "assistant", content: "I'm Rz, your AI data analyst. Upload a file to get a real data quality read, auto-charts, and analysis, or just ask me a question — SQL, Excel formulas, dashboard design, whatever you need." }
];
let dataset = null;
let loading = false;
let chartInstances = [];
let currentUser = null;

const messagesEl = document.getElementById('messages');
const statusBar = document.getElementById('status-bar');
const pastePanel = document.getElementById('paste-panel');
const pasteArea = document.getElementById('paste-area');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const fileInput = document.getElementById('file-input');
const chartsContainer = document.getElementById('charts-container');
const scrollArea = document.getElementById('scroll-area');

let authMode = 'signup';
const tabSignup = document.getElementById('tab-signup');
const tabLogin = document.getElementById('tab-login');
const authSubmit = document.getElementById('auth-submit');
const authError = document.getElementById('auth-error');
const authEmail = document.getElementById('auth-email');
const authPassword = document.getElementById('auth-password');

function setAuthMode(mode) {
  authMode = mode;
  tabSignup.classList.toggle('active', mode === 'signup');
  tabLogin.classList.toggle('active', mode === 'login');
  authSubmit.textContent = mode === 'signup' ? 'Sign Up' : 'Log In';
  document.getElementById('name-field').style.display = mode === 'signup' ? 'block' : 'none';
  authError.style.display = 'none';
}
tabSignup.onclick = () => setAuthMode('signup');
tabLogin.onclick = () => setAuthMode('login');

document.getElementById('password-toggle').onclick = () => {
  const field = authPassword;
  const toggle = document.getElementById('password-toggle');
  if (field.type === 'password') {
    field.type = 'text';
    toggle.textContent = '🙈';
  } else {
    field.type = 'password';
    toggle.textContent = '👁️';
  }
};

authSubmit.onclick = async () => {
  if (supabaseInitError) {
    authError.textContent = 'Setup error: ' + supabaseInitError + ' Double-check the SUPABASE_URL and SUPABASE_ANON_KEY values in index.html.';
    authError.style.display = 'block';
    return;
  }
  const name = document.getElementById('auth-name').value.trim();
  const email = authEmail.value.trim();
  const password = authPassword.value;
  authError.style.display = 'none';
  if (authMode === 'signup' && !name) { authError.textContent = 'Enter your name.'; authError.style.display = 'block'; return; }
  if (!email || !password) { authError.textContent = 'Enter an email and password.'; authError.style.display = 'block'; return; }
  authSubmit.disabled = true;
  authSubmit.textContent = 'Please wait...';
  try {
    let result;
    if (authMode === 'signup') {
      result = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
    } else {
      result = await sb.auth.signInWithPassword({ email, password });

    authError.style.display = 'block';
  } finally {

  html = html.replace(/^## (.*)$/gm, '<div style="font-weight:700; font-size:15px; margin:12px 0 6px; color:#4FA3F7;">$1</div>');
  html = html.replace(/^# (.*)$/gm, '<div style="font-weight:700; font-size:16px; margin:14px 0 6px; color:#4FA3F7;">$1</div>');

function computeProfile(data, fields) {
  const rowCount = data.length;
  const cols = fields.map((f) => {
    let missing = 0, numeric = 0;
    const seen = new Set();
    data.forEach((row) => {
      const v = row[f];
      if (v === null || v === undefined || v === "") missing++;
      else {
        if (!isNaN(parseFloat(v)) && isFinite(v)) numeric++;
        seen.add(v);
      }
    });
    const type = numeric / Math.max(rowCount - missing, 1) > 0.8 ? "numeric" : "text";
    return { name: f, type, missing, missingPct: rowCount ? ((missing / rowCount) * 100).toFixed(1) : "0", distinct: seen.size };
  });
  const seenRows = new Set();
  let dupRows = 0;
  data.forEach((row) => {
    const key = JSON.stringify(row);
    if (seenRows.has(key)) dupRows++;
    seenRows.add(key);
  });
  const totalMissing = cols.reduce((a, c) => a + c.missing, 0);
  const totalCells = rowCount * fields.length;
  const qualityScore = totalCells ? Math.max(0, 100 - (totalMissing / totalCells) * 100 - (dupRows / Math.max(rowCount, 1)) * 30) : 100;

  // --- Duplicate business-key detection (e.g. repeated Order IDs) ---
  const keyLike = cols.filter(c => /id$|code|key$|sku|invoice|order/i.test(c.name) && c.distinct > 1);
  const duplicateKeys = keyLike.map(c => {
    const nonMissing = rowCount - c.missing;
    const dupCount = nonMissing - c.distinct;
    return { name: c.name, dupCount };
  }).filter(k => k.dupCount > 0);

  // --- Anomaly detection ---
  const anomalies = [];
  const moneyLike = /price|cost|amount|revenue|salary|profit|total|fee|charge/i;
  const qtyLike = /quantity|qty|units|count/i;
  const ageLike = /^age$|_age$|age_/i;

  cols.forEach(c => {
    if (c.type !== 'numeric') return;
    const values = data.map(r => parseFloat(r[c.name])).filter(v => !isNaN(v));
    if (!values.length) return;

    if ((moneyLike.test(c.name) || qtyLike.test(c.name))) {
      const negCount = values.filter(v => v < 0).length;
      if (negCount > 0) anomalies.push({ type: 'Negative values', column: c.name, count: negCount });
    }
    if (ageLike.test(c.name)) {
      const badAge = values.filter(v => v < 0 || v > 120).length;
      if (badAge > 0) anomalies.push({ type: 'Impossible age', column: c.name, count: badAge });
    }

    // IQR-based outlier detection
    const sorted = [...values].sort((a, b) => a - b);
    const q1 = sorted[Math.floor(sorted.length * 0.25)];
    const q3 = sorted[Math.floor(sorted.length * 0.75)];
    const iqr = q3 - q1;
    if (iqr > 0) {
      const lower = q1 - 1.5 * iqr, upper = q3 + 1.5 * iqr;
      const outliers = values.filter(v => v < lower || v > upper).length;
      if (outliers > 0) anomalies.push({ type: 'Statistical outliers', column: c.name, count: outliers });
    }
  });

  cols.forEach(c => {
    if (!isDateLike(c.name)) return;
    const today = new Date();
    let futureCount = 0;
    data.forEach(r => {
      const d = new Date(r[c.name]);
      if (!isNaN(d.getTime()) && d > today) futureCount++;
    });
    if (futureCount > 0) anomalies.push({ type: 'Future dates', column: c.name, count: futureCount });
  });

  return { rowCount, colCount: fields.length, cols, dupRows, qualityScore: qualityScore.toFixed(0), duplicateKeys, anomalies };
}

function removeDuplicateRows() {
  if (!dataset) return;
  const seen = new Set();
  const cleaned = dataset.rows.filter(row => {
    const key = JSON.stringify(row);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  const removed = dataset.rows.length - cleaned.length;
  applyDataset(dataset.fields, cleaned, dataset.fileName, true);
  messages.push({ role: 'assistant', content: `Removed **${removed}** duplicate row(s). Dataset now has ${cleaned.length.toLocaleString()} rows.` });
  renderMessages();
  saveChatHistory();
}

function fillMissingValues() {
  if (!dataset) return;
  const { fields, rows, profile } = dataset;
  let filledCount = 0;
  const colStats = {};
  profile.cols.forEach(c => {
    if (c.type === 'numeric') {
      const values = rows.map(r => parseFloat(r[c.name])).filter(v => !isNaN(v));
      colStats[c.name] = values.length ? (values.reduce((a, b) => a + b, 0) / values.length) : 0;
    } else {
      const counts = {};
      rows.forEach(r => { const v = r[c.name]; if (v) counts[v] = (counts[v] || 0) + 1; });
      const mode = Object.keys(counts).sort((a, b) => counts[b] - counts[a])[0];
      colStats[c.name] = mode || 'Unknown';
    }
  });
  const filled = rows.map(row => {
    const newRow = { ...row };
    fields.forEach(f => {
      if (newRow[f] === null || newRow[f] === undefined || newRow[f] === '') {
        newRow[f] = typeof colStats[f] === 'number' ? colStats[f].toFixed(2) : colStats[f];
        filledCount++;
      }
    });
    return newRow;
  });
  applyDataset(fields, filled, dataset.fileName, true);
  messages.push({ role: 'assistant', content: `Filled **${filledCount}** missing value(s) — numeric columns with their mean, text columns with their most common value.` });
  renderMessages();
  saveChatHistory();
}

function pearsonCorrelation(x, y) {
  const n = x.length;
  const meanX = x.reduce((a, b) => a + b, 0) / n;
  const meanY = y.reduce((a, b) => a + b, 0) / n;
  let num = 0, denX = 0, denY = 0;
  for (let i = 0; i < n; i++) {
    const dx = x[i] - meanX, dy = y[i] - meanY;
    num += dx * dy; denX += dx * dx; denY += dy * dy;
  }
  const den = Math.sqrt(denX * denY);
  return den === 0 ? 0 : num / den;
}

function correlationColor(v) {
  if (v > 0) {
    const t = Math.min(v, 1);
    return `rgba(99,102,241,${0.15 + t * 0.75})`;
  } else {
    const t = Math.min(-v, 1);
    return `rgba(239,68,68,${0.15 + t * 0.75})`;
  }
}

function renderCorrelationHeatmap(rows, profile) {
  const numericCols = profile.cols.filter(c => c.type === 'numeric' && !isIdLike(c.name));
  if (numericCols.length < 2) return;
  const cols = numericCols.slice(0, 6);
  const series = cols.map(c => rows.map(r => parseFloat(r[c.name])).map(v => isNaN(v) ? 0 : v));

  const card = document.createElement('div');
  card.className = 'chart-card';
  const label = document.createElement('div');
  label.className = 'chart-title';
  label.innerText = 'Correlation Heatmap';
  card.appendChild(label);

  const wrap = document.createElement('div');
  wrap.style.overflowX = 'auto';
  const grid = document.createElement('div');
  grid.className = 'heatmap-grid';
  grid.style.gridTemplateColumns = `70px repeat(${cols.length}, 44px)`;
  grid.style.minWidth = `${70 + cols.length * 44}px`;

  grid.appendChild(document.createElement('div'));
  cols.forEach(c => {
    const l = document.createElement('div');
    l.className = 'heatmap-label';
    l.innerText = c.name;
    grid.appendChild(l);
  });

  cols.forEach((rowCol, i) => {
    const rowLabel = document.createElement('div');
    rowLabel.className = 'heatmap-label';
    rowLabel.innerText = rowCol.name;
    grid.appendChild(rowLabel);
    cols.forEach((colCol, j) => {
      const corr = i === j ? 1 : pearsonCorrelation(series[i], series[j]);
      const cell = document.createElement('div');
      cell.className = 'heatmap-cell';
      cell.style.background = correlationColor(corr);
      cell.innerText = corr.toFixed(2);
      grid.appendChild(cell);
    });
  });

  wrap.appendChild(grid);
  card.appendChild(wrap);
  chartsContainer.appendChild(card);
}

function renderCharts(rows, profile) {
  clearCharts();
  const numericCols = profile.cols.filter(c => c.type === 'numeric' && !isIdLike(c.name));
  const categoricalCols = profile.cols.filter(c => c.type === 'text' && c.distinct > 1 && c.distinct <= 15 && !isDateLike(c.name));
  const dateCol = profile.cols.find(c => isDateLike(c.name));
  const primaryNumeric = numericCols[0];

  chartsContainer.classList.add('has-charts');
  renderStatCards(rows, profile);
  renderIntegrityBanner(profile);
  renderSummaryStats(rows, profile);

  if (!numericCols.length && !categoricalCols.length) return;

  if (categoricalCols[0]) {
    const col = categoricalCols[0];
    const counts = {};
    rows.forEach(r => { const v = r[col.name] || 'Unknown'; counts[v] = (counts[v] || 0) + 1; });
    const canvas = addChartCard(`${col.name} — composition`);
    chartInstances.push(new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: Object.keys(counts),
        datasets: [{
          data: Object.values(counts),
          backgroundColor: CHART_COLORS,
          borderColor: '#0A1428',
          borderWidth: 2,
          hoverOffset: 8
        }]
      },
      options: {
        cutout: '55%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: '#E6EAF0', font: { size: 10 }, padding: 10, usePointStyle: true, pointStyle: 'circle' }
          }
        }
      }
    }));
  }

  categoricalCols.slice(0, 4).forEach(col => {
    if (!primaryNumeric) return;
    const sums = {};
    rows.forEach(r => {
      const key = r[col.name] || 'Unknown';
      const val = parseFloat(r[primaryNumeric.name]) || 0;
      sums[key] = (sums[key] || 0) + val;
    });
    const labels = Object.keys(sums);
    const canvas = addChartCard(`${primaryNumeric.name} by ${col.name}`);
    chartInstances.push(new Chart(canvas, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: primaryNumeric.name,
          data: Object.values(sums),
          backgroundColor: labels.map((_, i) => CHART_COLORS[i % CHART_COLORS.length]),
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#7C8797', font: { size: 9 } }, grid: { display: false } },
          y: { ticks: { color: '#7C8797', font: { size: 9 } }, grid: { color: 'rgba(32,54,91,0.5)' } }
        }
      }
    }));
  });

  if (dateCol && primaryNumeric) {
    const byDate = {};
    rows.forEach(r => {
      const d = r[dateCol.name];
      if (!d) return;
      const val = parseFloat(r[primaryNumeric.name]) || 0;
      byDate[d] = (byDate[d] || 0) + val;
    });
    const labels = Object.keys(byDate).sort();
    const canvas = addChartCard(`${primaryNumeric.name} over ${dateCol.name}`);
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 200);
    gradient.addColorStop(0, 'rgba(99,102,241,0.45)');
    gradient.addColorStop(1, 'rgba(99,102,241,0.02)');
    chartInstances.push(new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: primaryNumeric.name,
          data: labels.map(l => byDate[l]),
          borderColor: '#6366F1',
          backgroundColor: gradient,
          fill: true,
          tension: 0.35,
          pointBackgroundColor: '#06B6D4',
          pointBorderColor: '#0A1428',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6,
          borderWidth: 2.5
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#7C8797', font: { size: 9 } }, grid: { display: false } },
          y: { ticks: { color: '#7C8797', font: { size: 9 } }, grid: { color: 'rgba(32,54,91,0.5)' } }
        }
      }
    }));
  }

  numericCols.slice(0, 4).forEach(col => {
    const values = rows.map(r => parseFloat(r[col.name])).filter(v => !isNaN(v));
    if (!values.length) return;
    const min = Math.min(...values), max = Math.max(...values);
    const bucketCount = 6;
    const size = (max - min) / bucketCount || 1;
    const buckets = new Array(bucketCount).fill(0);
    values.forEach(v => {
      let idx = Math.floor((v - min) / size);
      if (idx >= bucketCount) idx = bucketCount - 1;
      if (idx < 0) idx = 0;
      buckets[idx]++;
    });
    const labels = buckets.map((_, i) => `${Math.round(min + i * size)}–${Math.round(min + (i + 1) * size)}`);
    const maxBucket = Math.max(...buckets);
    const barColors = buckets.map(v => {
      const intensity = maxBucket ? v / maxBucket : 0;
      return `rgba(245,158,11,${0.3 + intensity * 0.6})`;
    });
    const canvas = addChartCard(`${col.name} — distribution`);
    chartInstances.push(new Chart(canvas, {
      type: 'bar',
      data: { labels, datasets: [{ label: col.name, data: buckets, backgroundColor: barColors, borderRadius: 6, borderSkipped: false }] },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#7C8797', font: { size: 9 } }, grid: { display: false } },
          y: { ticks: { color: '#7C8797', font: { size: 9 } }, grid: { color: 'rgba(32,54,91,0.5)' } }
        }
      }
    }));
  });

  renderScatterPlot(rows, profile);
  renderCorrelationHeatmap(rows, profile);
}

function renderSuggestedChips(profile) {
  const chipsRow = document.getElementById('chips-row');
  const numericCols = profile.cols.filter(c => c.type === 'numeric' && !isIdLike(c.name));
  const categoricalCols = profile.cols.filter(c => c.type === 'text' && c.distinct > 1 && c.distinct <= 15 && !isDateLike(c.name));
  const dateCol = profile.cols.find(c => isDateLike(c.name));
  const suggestions = [];

  if (categoricalCols[0] && numericCols[0]) {
    suggestions.push(`Which ${categoricalCols[0].name.toLowerCase()} generates the most ${numericCols[0].name.toLowerCase()}?`);
  }
  if (dateCol && numericCols[0]) {
    suggestions.push(`Show the ${numericCols[0].name.toLowerCase()} trend over time`);
  }
  if (numericCols.length >= 2) {
    suggestions.push('Explain the correlation heatmap');
  }
  if (profile.anomalies.length > 0 || profile.duplicateKeys.length > 0) {
    suggestions.push('What data quality issues did you find?');
  }
  suggestions.push('Which records generate the highest value?');

  chipsRow.innerHTML = '';
  suggestions.slice(0, 4).forEach(text => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.innerText = text;
    chip.onclick = () => { chatInput.value = text; sendMessage(); };
    chipsRow.appendChild(chip);
  });
  chipsRow.style.display = suggestions.length ? 'flex' : 'none';
}

function applyDataset(fields, rows, label, persist = true) {
  if (!fields.length || !rows.length) { showError("Couldn't find valid rows/columns in that file."); return; }
  const profile = computeProfile(rows, fields);
  dataset = { fileName: label, fields, rows, profile };
  renderStatusBar();
  renderCharts(rows, profile);
  renderSuggestedChips(profile);
  document.getElementById('report-btn').style.display = 'flex';
  document.getElementById('pdf-export-btn').style.display = 'flex';
  const featuresEl = document.getElementById('post-login-features');
  if (featuresEl) featuresEl.style.display = 'none';
  pastePanel.classList.remove('open');
  pasteArea.value = '';
  messages.push({ role: 'assistant', content: `Loaded ${label} — ${profile.rowCount.toLocaleString()} rows × ${profile.colCount} columns. Quality score: ${profile.qualityScore}/100. Charts are above. Ask me anything about it, or say "analyze this" for a full breakdown.` });
  renderMessages();
  if (persist) saveDatasetToCloud();
  saveChatHistory();
}

function loadCsvText(text, label) {
  Papa.parse(text, {
    header: true,
    dynamicTyping: false,
    skipEmptyLines: true,
    complete: (results) => applyDataset(results.meta.fields || [], results.data, label),
    error: (err) => showError("Couldn't parse that: " + err.message)
  });
}

function loadExcelFile(arrayBuffer, label) {
  try {
    const wb = XLSX.read(arrayBuffer, { type: 'array' });
    const sheetName = wb.SheetNames[0];
    const sheet = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
    const fields = rows.length ? Object.keys(rows[0]) : [];
    applyDataset(fields, rows, label + (wb.SheetNames.length > 1 ? ` (sheet: ${sheetName})` : ''));
  } catch (err) {
    showError("Couldn't read that Excel file: " + err.message);
  }
}

function loadJsonText(text, label) {
  try {
    const parsed = JSON.parse(text);
    const rows = Array.isArray(parsed) ? parsed : (parsed.data && Array.isArray(parsed.data) ? parsed.data : null);
    if (!rows) { showError("JSON file must be an array of records (or an object with a 'data' array)."); return; }
    const fieldSet = new Set();
    rows.forEach(r => Object.keys(r).forEach(k => fieldSet.add(k)));
    applyDataset(Array.from(fieldSet), rows, label);
  } catch (err) {
    showError("Couldn't parse that JSON file: " + err.message);
  }
}

function processFile(file) {
  const name = file.name.toLowerCase();
  const reader = new FileReader();
  if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
    reader.onload = (ev) => loadExcelFile(ev.target.result, file.name);
    reader.onerror = () => showError("Couldn't read that file.");
    reader.readAsArrayBuffer(file);
  } else if (name.endsWith('.json')) {
    reader.onload = (ev) => loadJsonText(ev.target.result, file.name);
    reader.onerror = () => showError("Couldn't read that file.");
    reader.readAsText(file);
  } else {
    reader.onload = (ev) => loadCsvText(ev.target.result, file.name);
    reader.onerror = () => showError("Couldn't read that file.");
    reader.readAsText(file);
  }
}

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  processFile(file);
  e.target.value = '';
});

// Drag & drop support across the whole app screen
const appScreen = document.getElementById('app-screen');
['dragenter', 'dragover'].forEach(evt => {
  appScreen.addEventListener(evt, (e) => { e.preventDefault(); appScreen.classList.add('drag-over'); });
});
['dragleave', 'drop'].forEach(evt => {
  appScreen.addEventListener(evt, (e) => { e.preventDefault(); appScreen.classList.remove('drag-over'); });
});
appScreen.addEventListener('drop', (e) => {
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

document.getElementById('paste-toggle').onclick = () => pastePanel.classList.toggle('open');
document.getElementById('report-btn').onclick = () => {
  if (!dataset) return;
  chatInput.value = 'Generate a full report with these exact sections: ## Executive Summary, ## Top 10 Insights, ## Business Recommendations, ## Data Quality Report, ## Suggested Visualizations. Use ## for each section header and - for bullet points.';
  sendMessage();
};
document.getElementById('pdf-export-btn').onclick = () => {
  const lastReport = [...messages].reverse().find(m => m.role === 'assistant' && /Executive Summary|##/.test(m.content));
  const content = lastReport ? lastReport.content : (messages[messages.length - 1]?.content || 'No report generated yet.');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text('RZ AI Data Analyst — Report', 14, 18);
  doc.setFontSize(10);
  doc.setTextColor(120);
  doc.text(dataset ? `Dataset: ${dataset.fileName}` : '', 14, 25);
  doc.setTextColor(20);
  doc.setFontSize(11);
  const cleanText = content.replace(/\*\*(.+?)\*\*/g, '$1').replace(/^##?\s*/gm, '');
  const lines = doc.splitTextToSize(cleanText, 180);
  doc.text(lines, 14, 35);
  doc.save(`rz-report-${Date.now()}.pdf`);
};
document.getElementById('cancel-btn').onclick = () => { pastePanel.classList.remove('open'); pasteArea.value = ''; };
document.getElementById('load-btn').onclick = () => {
  if (pasteArea.value.trim()) loadCsvText(pasteArea.value, 'pasted data');
};

function buildDataContext() {
  if (!dataset) return '';
  const { fileName, fields, rows, profile } = dataset;
  const sample = rows.slice(0, 8);
  const dupKeyText = profile.duplicateKeys.length
    ? profile.duplicateKeys.map(k => `- ${k.name}: ${k.dupCount} duplicate values (likely repeated business records, e.g. re-shipped or re-entered orders)`).join('\n')
    : 'None detected.';
  const anomalyText = profile.anomalies.length
    ? profile.anomalies.map(a => `- ${a.type} in "${a.column}": ${a.count} affected rows`).join('\n')
    : 'None detected.';
  return `\n\n---DATASET CONTEXT (background reference only — do NOT re-analyze or summarize this unless the user's message actually asks a question about the data. If the message is just a greeting, thanks, or casual remark, just respond to that naturally and briefly)---\nFile: ${fileName}\nRows: ${profile.rowCount}, Columns: ${profile.colCount}\nQuality score: ${profile.qualityScore}/100, Duplicate rows (fully identical): ${profile.dupRows}\n\nDuplicate business keys (same ID/code repeated, even if the row isn't fully identical):\n${dupKeyText}\n\nData anomalies detected (negative values in price/quantity fields, impossible ages, future dates, statistical outliers via IQR method):\n${anomalyText}\n\nColumn profile:\n${profile.cols.map(c => `- ${c.name} (${c.type}): ${c.missingPct}% missing, ${c.distinct} distinct values`).join('\n')}\n\nSample rows (first 8, as JSON):\n${JSON.stringify(sample)}\n---END DATASET CONTEXT---`;
}

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || loading) return;

  if (!userProfile.is_pro && userProfile.message_count >= 5) {
    messages.push({ role: 'user', content: text });
    chatInput.value = '';
    renderMessages();
    const hitTime = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    showError(`You reached your limit for today at ${hitTime}. Resets at midnight. Upgrade to Pro for unlimited messages.`);
    return;
  }

  messages.push({ role: 'user', content: text });
  chatInput.value = '';
  loading = true;
  renderMessages();
  if (!userProfile.is_pro) incrementMessageCount();

  let errorMsg = null;
  try {
    const apiMessages = messages.map((m, i) => {
      if (i === messages.length - 1 && m.role === 'user' && dataset) {
        return { role: 'user', content: m.content + buildDataContext() };
      }
      return { role: m.role, content: m.content };
    });

    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: SYSTEM_PROMPT, messages: apiMessages })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Request failed');

    const textBlocks = (data.content || []).map(b => b.type === 'text' ? b.text : '').filter(Boolean).join('\n');
    messages.push({ role: 'assistant', content: textBlocks || "Sorry, I didn't get a response — try again." });
  } catch (err) {
    errorMsg = 'Something went wrong reaching Rz: ' + err.message;
  } finally {
    loading = false;
    renderMessages();
    if (errorMsg) showError(errorMsg);
    saveChatHistory();
  }
}

sendBtn.onclick = sendMessage;
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
